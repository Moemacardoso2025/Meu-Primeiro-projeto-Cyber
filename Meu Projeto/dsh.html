<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nena Cardoso</title>
  <style>
    body {
      text-align: center;
      background: url("cyber-circuit-future-technology-concept-background_42077-6920.avif") no-repeat center/cover;
      color: #fff;
      font-family: Helvetica, Arial, sans-serif;
      margin: 0;
      padding: 0;
    }

    p {
      font-size: 22px;
    }

    form {
      margin: 20px auto;
      max-width: 300px;
    }

    input {
      border: 0;
      padding: 10px;
      font-size: 18px;
      width: 100%;
      box-sizing: border-box;
      margin-bottom: 10px;
    }

    input[type="submit"] {
      background: red;
      color: white;
      cursor: pointer;
    }

    img {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #ccc;
    }

    ul {
      padding: 0;
      margin: 20px auto;
      max-width: 200px;
      text-align: left;
    }

    li {
      font-size: 18px;
      list-style: none;
      color: white;
      border-left: 4px solid red;
      padding-left: 10px;
      margin: 10px 0;
      transition: background 0.3s, color 0.3s;
    }

    /* hover styles */
    li:hover {
      background: rgba(255,255,255,0.1);
      color: #ff0;
      cursor: pointer;
    }

    input[type="submit"]:hover {
      background: #cc0000;
    }

    img:hover {
      transform: scale(1.1);
      transition: transform 0.3s;
    }
  </style>
</head>
<body>
  <img src="IMG_20201117_134126_321.jpg" alt="Foto de Nena Cardoso">
  <h1><em>Nena Cardoso</em></h1>
  <p>Aspirante a Desenvolvedora Full‑stack</p>

  <form action="#" method="post">
    <input type="email" name="email" placeholder="Seu e‑mail" required>
    <input type="submit" value="Inscrever-se">
  </form>

  <h3>Minhas Skills</h3>
  <ul>
    <li>HTML</li>
    <li>CSS</li>
    <li>JavaScript</li>
  </ul>

  <script>
    // mostra agradecimento ao enviar o formulário
    document.querySelector('form').addEventListener('submit', function(e) {
      e.preventDefault();
      alert('Obrigado por se inscrever!');
    });

    // adiciona clique interativo nas skills
    document.querySelectorAll('li').forEach(function(item) {
      item.addEventListener('click', function() {
        alert('Você clicou em ' + this.textContent + '!');
      });
    });

    // muda cor do título ao passar o mouse
    const title = document.querySelector('h1');
    title.addEventListener('mouseover', function() {
      this.style.color = '#ff0';
    });
    title.addEventListener('mouseout', function() {
      this.style.color = '';
    });
  </script>
</body>
</html>
