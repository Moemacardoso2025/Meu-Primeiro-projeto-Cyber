<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Moema Cardoso</title>
  <style>
    /* Reset básico para evitar margens estranhas */
    * {
      box-sizing: border-box;
    }

    body {
      text-align: center;
      /* Dica: Verifique se o caminho da imagem está correto no seu projeto */
      background: #1a1a1a url("cyber-circuit-future-technology-concept-background_42077-6920.avif") no-repeat center/cover;
      background-attachment: fixed; /* Mantém o fundo fixo ao rolar */
      color: #fff;
      font-family: 'Helvetica', 'Arial', sans-serif;
      margin: 0;
      padding: 40px 20px;
      min-height: 100vh;
    }

    h1 {
      transition: color 0.3s ease;
      cursor: default;
    }

    p {
      font-size: 22px;
      margin-bottom: 30px;
    }

    /* Formulário */
    form {
      margin: 20px auto;
      max-width: 300px;
    }

    input {
      border: none;
      padding: 12px;
      font-size: 16px;
      width: 100%;
      margin-bottom: 10px;
      border-radius: 5px;
    }

    input[type="submit"] {
      background: #ff0000;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }

    input[type="submit"]:hover {
      background: #cc0000;
    }

    /* Imagem de Perfil */
    img {
      width: 140px;
      height: 140px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #ccc;
      transition: transform 0.3s ease;
      margin-bottom: 10px;
    }

    img:hover {
      transform: scale(1.1);
    }

    /* Lista de Skills */
    ul {
      padding: 0;
      margin: 20px auto;
      max-width: 250px;
      list-style: none;
    }

    li {
      font-size: 18px;
      color: white;
      border-left: 4px solid red;
      padding: 10px 15px;
      margin: 10px 0;
      background: rgba(255, 255, 255, 0.05);
      transition: all 0.3s ease;
      text-align: left;
    }

    li:hover {
      background: rgba(255, 255, 255, 0.15);
      color: #ff0;
      transform: translateX(10px);
      cursor: pointer;
    }
  </style>
</head>
<body>

  <img src="IMG_20201117_134126_321.jpg" alt="Foto de Nena Cardoso">
  
  <h1><em>Moema Cardoso</em></h1>
  <p>Desenvolvedora Front-end junior!</p>

  <form id="subscribeForm" action="#" method="post">
    <label for="email" style="display:none;">E-mail:</label>
    <input type="email" id="email" name="email" placeholder="Seu e-mail profissional" required>
    <input type="submit" value="Inscrever-se">
  </form>

  <section>
    <h3>Minhas Skills</h3>
    <ul>
      <li>HTML</li>
      <li>CSS</li>
      <li>JavaScript</li>
    </ul>
  </section>

  <script>
    // 1. Script de submissão do formulário
    const form = document.querySelector('#subscribeForm');
    form.addEventListener('submit', (e) => {
      e.preventDefault();
      const email = document.querySelector('#email').value;
      alert(`Obrigado por se inscrever, ${email}!`);
      form.reset(); // Limpa o campo após o envio
    });

    // 2. Clique interativo nas skills
    const skills = document.querySelectorAll('li');
    skills.forEach(item => {
      item.addEventListener('click', () => {
        alert(`Você quer saber mais sobre ${item.textContent}?`);
      });
    });

    // 3. Efeito no título (Hover via JS)
    const title = document.querySelector('h1');
    title.addEventListener('mouseenter', () => {
      title.style.color = '#ff0';
    });
    title.addEventListener('mouseleave', () => {
      title.style.color = ''; // Retorna ao padrão do CSS
    });
  </script>

</body>
</html>
